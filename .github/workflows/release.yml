name: Release

# Builds desktop installers on a version tag and publishes them to a GitHub
# Release. The landing page (landing/index.html, served via Pages) points users
# at these assets — that's the "install off GitHub" front door.
#
# DISTRIBUTION STANCE: no vendor lock-in. The default build is unsigned-by-a-CA
# and fully functional off GitHub (Linux runs clean; Windows/macOS show a
# one-time caution prompt). Two independent, OPTIONAL layers:
#
# RECOMMENDED (free, sovereign — enables auto-update, no Apple/Microsoft):
#   TAURI_PRIVATE_KEY   — Tauri updater private key (from `tauri signer generate`)
#   TAURI_KEY_PASSWORD  — password for that key
#   (also set tauri.conf.json updater.active=true with the matching pubkey)
#
# OPTIONAL (paid, removes the OS caution prompt — only if you choose to):
#   WINDOWS_CERTIFICATE / WINDOWS_CERTIFICATE_PASSWORD          — Authenticode
#   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD /
#   APPLE_SIGNING_IDENTITY / APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID
#
# Any absent secret is simply skipped — the build still succeeds. See docs/RELEASE.md.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # tauri-action creates the draft release + uploads assets

jobs:
  release:
    name: Build installers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-22.04, not -latest: Tauri v1 needs libwebkit2gtk-4.0, which
        # Ubuntu 24.04 no longer ships.
        # macos-latest = Apple Silicon; macos-15-intel = the last free x86_64
        # image (available until Aug 2027) so Intel Macs get a native .dmg too.
        os: [ubuntu-22.04, windows-latest, macos-latest, macos-15-intel]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        if: matrix.os != 'macos-15-intel'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Intel leg targets old Macs (2012-era hardware maxes out at Catalina
      # 10.15). Two things make that work: MACOSX_DEPLOYMENT_TARGET=10.15 for
      # everything compiled in this job (Rust/Tauri included), and the
      # python.org framework Python — built for macOS 10.13+, so the sidecar
      # AND every wheel pip selects (platform tag macosx_10_13) run on
      # Catalina. actions/setup-python builds target the runner's macOS and
      # would quietly produce an 11.0+-only sidecar.
      - name: Set up Python 3.12 (python.org, Catalina-compatible)
        if: matrix.os == 'macos-15-intel'
        run: |
          curl -sSLo python.pkg https://www.python.org/ftp/python/3.12.8/python-3.12.8-macos11.pkg
          sudo installer -pkg python.pkg -target /
          echo "/Library/Frameworks/Python.framework/Versions/3.12/bin" >> "$GITHUB_PATH"
          echo "MACOSX_DEPLOYMENT_TARGET=10.15" >> "$GITHUB_ENV"

      - name: Build gateway sidecar
        if: matrix.os != 'macos-15-intel'
        # Bounded PyInstaller for build consistency across the matrix (E4).
        run: pip install "pyinstaller>=6.10,<7" && pip install -e "./proxion-messenger-core[gateway]" && python build_sidecar.py

      - name: Build gateway sidecar (Catalina-compatible)
        if: matrix.os == 'macos-15-intel'
        # python3 -m pip: the python.org framework install ships python3/pip3
        # only (no bare `python`), unlike actions/setup-python.
        run: python3 -m pip install "pyinstaller>=6.10,<7" && python3 -m pip install -e "./proxion-messenger-core[gateway]" && python3 build_sidecar.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI deps
        working-directory: tauri-app
        run: npm ci

      - name: Build + sign Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          # Required for creating the release and uploading assets.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (empty until provisioned → unsigned, no auto-update)
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          # NOTE: when provisioning OS code-signing later, add the secret env
          # lines back HERE (WINDOWS_CERTIFICATE*, APPLE_*). They must be
          # OMITTED while unset: GitHub passes undefined secrets as empty
          # strings, and tauri-action treats a set-but-empty APPLE_CERTIFICATE
          # as "signing configured" and fails importing the empty cert.
        with:
          projectPath: tauri-app
          tagName: ${{ github.ref_name }}
          releaseName: "Proxion ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install. Auto-update applies on next launch once signing is configured."
          releaseDraft: true
          prerelease: false
          # tauri-action generates latest.json (the updater manifest) automatically
          # when updater signing is configured, and uploads it to the release.
          includeUpdaterJson: true

  # E4 (verifiable builds): once all three OS builds have uploaded their
  # assets, publish a SHA256SUMS.txt and sign build-provenance attestations
  # binding each asset digest to this workflow run. Users verify with
  #   sha256sum -c SHA256SUMS.txt          (or certutil/shasum, see docs/VERIFYING.md)
  #   gh attestation verify <file> --repo <owner>/<repo>
  verify:
    name: Checksums + provenance
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write      # upload SHA256SUMS.txt to the (draft) release
      id-token: write      # sign the attestation via GitHub OIDC
      attestations: write  # store the attestation
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" --repo "${{ github.repository }}" --dir assets
          ls -l assets

      - name: Generate SHA256SUMS.txt
        run: |
          cd assets
          sha256sum * | tee ../SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: assets/*

      - name: Upload SHA256SUMS.txt to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" SHA256SUMS.txt --repo "${{ github.repository }}" --clobber
