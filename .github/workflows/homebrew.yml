name: Update Homebrew tap

# When a release is PUBLISHED (not drafted — tauri-action drafts, the
# maintainer publishes), regenerate the cask in cafeTechne/homebrew-proxion
# with the new version + per-arch sha256 so `brew install
# cafeTechne/proxion/proxion` serves the new build.
#
# Needs ONE secret: TAP_GITHUB_TOKEN — a fine-grained PAT with Contents:write
# on cafeTechne/homebrew-proxion (the default GITHUB_TOKEN is scoped to this
# repo only and cannot push cross-repo). Until it's set, this job no-ops with
# a notice; the cask can be bumped by hand meanwhile.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  bump-cask:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Regenerate cask in cafeTechne/homebrew-proxion
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::notice::TAP_GITHUB_TOKEN not set — skipping Homebrew tap update. Add a fine-grained PAT with Contents:write on cafeTechne/homebrew-proxion to enable."
            exit 0
          fi
          VERSION="${TAG#v}"
          case "$VERSION" in
            *-*) echo "Pre-release tag $TAG — skipping tap update."; exit 0 ;;
          esac

          mkdir dl && cd dl
          gh release download "$TAG" --repo "${{ github.repository }}" --pattern "*_aarch64.dmg" --pattern "*_x64.dmg"
          ARM_DMG=$(ls *_aarch64.dmg 2>/dev/null | head -1 || true)
          INTEL_DMG=$(ls *_x64.dmg 2>/dev/null | head -1 || true)
          if [ -z "$ARM_DMG" ]; then
            echo "::error::No aarch64 .dmg on release $TAG — refusing to update the cask."
            exit 1
          fi
          ARM_SHA=$(sha256sum "$ARM_DMG" | cut -d' ' -f1)
          cd ..

          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/cafeTechne/homebrew-proxion.git" tap
          mkdir -p tap/Casks

          if [ -n "$INTEL_DMG" ]; then
            INTEL_SHA=$(sha256sum "dl/$INTEL_DMG" | cut -d' ' -f1)
            cat > tap/Casks/proxion.rb <<EOF
          cask "proxion" do
            arch arm: "aarch64", intel: "x64"

            version "$VERSION"
            sha256 arm:   "$ARM_SHA",
                   intel: "$INTEL_SHA"

            url "https://github.com/cafeTechne/proxion-messenger/releases/download/v#{version}/Proxion_#{version}_#{arch}.dmg"
            name "Proxion"
            desc "Sovereign messenger built on the Solid Protocol"
            homepage "https://cafetechne.github.io/proxion-messenger/"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :catalina"

            app "Proxion.app"

            zap trash: [
              "~/Library/Application Support/dev.proxion.app",
              "~/Library/Caches/dev.proxion.app",
              "~/Library/Preferences/dev.proxion.app.plist",
              "~/Library/Saved Application State/dev.proxion.app.savedState",
              "~/Library/WebKit/dev.proxion.app",
            ]
          end
          EOF
          else
            cat > tap/Casks/proxion.rb <<EOF
          cask "proxion" do
            version "$VERSION"
            sha256 "$ARM_SHA"

            url "https://github.com/cafeTechne/proxion-messenger/releases/download/v#{version}/Proxion_#{version}_aarch64.dmg"
            name "Proxion"
            desc "Sovereign messenger built on the Solid Protocol"
            homepage "https://cafetechne.github.io/proxion-messenger/"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on arch: :arm64
            depends_on macos: ">= :big_sur"

            app "Proxion.app"

            zap trash: [
              "~/Library/Application Support/dev.proxion.app",
              "~/Library/Caches/dev.proxion.app",
              "~/Library/Preferences/dev.proxion.app.plist",
              "~/Library/Saved Application State/dev.proxion.app.savedState",
              "~/Library/WebKit/dev.proxion.app",
            ]
          end
          EOF
          fi

          cd tap
          if git diff --quiet; then
            echo "Cask already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/proxion.rb
          git commit -m "proxion $VERSION"
          git push
