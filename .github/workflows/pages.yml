name: Deploy landing page

# Publishes landing/ to GitHub Pages — the public "install off GitHub" front door.
# The page reads the latest GitHub Release via the public API at view time, so it
# stays current without a rebuild on every release.
#
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".
# Also edit landing/index.html: set `const REPO = "<owner>/<repo>"`.

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: landing
      - id: deployment
        uses: actions/deploy-pages@v4
